name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Install package (for mypy)
        run: pip install -e "packages/backend[dev]"

      - name: Run ruff
        run: ruff check packages/backend/src/

      - name: Run mypy
        run: mypy packages/backend/src/forge/ --ignore-missing-imports

  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e "packages/backend[dev]"

      - name: Run tests
        run: |
          cd packages/backend
          pytest tests/ -v --cov=forge --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: packages/backend/coverage.xml
          fail_ci_if_error: false

  # ── Docker Build ─────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: forge:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
